<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancoolo FX — Documentation</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#2843E2',
                            'blue-light': '#E8ECFF',
                            orange: '#E8673C',
                            'orange-light': '#FEF0EB',
                            cream: '#F5F2ED',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        .nav-link.active {
            color: #2843E2;
            background: #E8ECFF;
            font-weight: 600;
        }
        .prose pre { background: #1E293B !important; border-radius: 8px; }
        .prose code { font-size: 0.85em; }
        .prose :not(pre) > code {
            background: #E8ECFF;
            padding: 2px 6px;
            border-radius: 4px;
            color: #2843E2;
            font-weight: 600;
        }
        .prose table { font-size: 0.9em; }
        .prose th { white-space: nowrap; }
        .prose hr { border-color: #e5e0d8; }
        .prose h1 { color: #1a1a1a; }
        .prose h2 { color: #E8673C; }
        .prose h3 { color: #1a1a1a; }
        .prose strong { color: #1a1a1a; }
        .prose a { color: #2843E2; }
    </style>
</head>
<body class="bg-brand-cream text-gray-900 antialiased">

    <!-- Top bar -->
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2">
                <span class="text-lg font-extrabold tracking-tight">Fancoolo</span>
                <span class="text-xs font-bold text-white bg-brand-blue px-2 py-0.5 rounded">FX</span>
            </a>
            <div class="flex items-center gap-3">
                <a href="../" class="text-sm text-gray-500 hover:text-gray-900 font-medium">Live Demo</a>
                <a href="https://github.com/krstivoja/gsap-animations-template" class="flex items-center gap-2 text-sm bg-gray-900 text-white px-3.5 py-1.5 rounded-full font-medium hover:bg-gray-700 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto flex min-h-screen">

        <!-- Sidebar -->
        <aside class="w-64 shrink-0 border-r border-gray-200/60 bg-white/50 hidden lg:block">
            <nav class="sticky top-14 p-6 space-y-6 max-h-[calc(100vh-3.5rem)] overflow-y-auto">

                <div>
                    <h3 class="text-[11px] font-bold text-brand-orange uppercase tracking-wider mb-2">Getting Started</h3>
                    <ul class="space-y-0.5">
                        <li><a href="#installation" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Installation</a></li>
                    </ul>
                </div>

                <div>
                    <h3 class="text-[11px] font-bold text-brand-orange uppercase tracking-wider mb-2">Core Concepts</h3>
                    <ul class="space-y-0.5">
                        <li><a href="#effects" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Effects</a></li>
                        <li><a href="#trigger-modes" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Trigger Modes</a></li>
                        <li><a href="#modifiers" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Modifiers</a></li>
                        <li><a href="#configuration" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Configuration</a></li>
                    </ul>
                </div>

                <div>
                    <h3 class="text-[11px] font-bold text-brand-orange uppercase tracking-wider mb-2">Advanced</h3>
                    <ul class="space-y-0.5">
                        <li><a href="#javascript-api" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">JavaScript API</a></li>
                        <li><a href="#wordpress" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">WordPress</a></li>
                        <li><a href="#examples" class="nav-link block px-3 py-1.5 text-sm rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition">Examples</a></li>
                    </ul>
                </div>

                <div class="pt-4 border-t border-gray-200/60">
                    <a href="https://www.npmjs.com/package/@fancoolo/fx" class="flex items-center gap-2 px-3 py-1.5 text-xs font-mono text-gray-400 hover:text-brand-blue transition">
                        npm i @fancoolo/fx
                    </a>
                </div>

            </nav>
        </aside>

        <!-- Mobile nav toggle -->
        <button id="mobile-nav-btn" class="lg:hidden fixed bottom-6 right-6 z-50 bg-brand-blue text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <!-- Main content -->
        <main class="flex-1 min-w-0">
            <div id="content" class="px-6 lg:px-12 py-10 max-w-3xl">
                <div class="prose prose-gray prose-lg max-w-none
                            prose-headings:font-extrabold prose-headings:tracking-tight
                            prose-h1:text-3xl prose-h1:border-b prose-h1:border-gray-200/60 prose-h1:pb-4 prose-h1:mb-6
                            prose-h2:text-xl prose-h2:mt-10
                            prose-h3:text-lg
                            prose-a:no-underline hover:prose-a:underline
                            prose-code:before:content-[''] prose-code:after:content-['']">
                    <p class="text-gray-400">Loading documentation...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="border-t border-gray-200/60 bg-white/30">
        <div class="max-w-7xl mx-auto px-6 py-8 flex items-center justify-between text-sm text-gray-400">
            <span>Fancoolo FX &mdash; A GSAP animation wrapper</span>
            <a href="https://gsap.com" class="hover:text-brand-blue transition">Built on GSAP</a>
        </div>
    </footer>

    <script>
        var pages = [
            { id: 'installation', file: 'installation.md' },
            { id: 'effects', file: 'effects.md' },
            { id: 'trigger-modes', file: 'trigger-modes.md' },
            { id: 'modifiers', file: 'modifiers.md' },
            { id: 'configuration', file: 'configuration.md' },
            { id: 'javascript-api', file: 'javascript-api.md' },
            { id: 'wordpress', file: 'wordpress.md' },
            { id: 'examples', file: 'examples.md' },
        ];

        var container = document.querySelector('#content .prose');

        Promise.all(pages.map(function (page) {
            return fetch(page.file)
                .then(function (r) { return r.text(); })
                .then(function (md) {
                    return '<section id="' + page.id + '" class="scroll-mt-20">' +
                           marked.parse(md) +
                           '</section>' +
                           '<hr class="my-16">';
                });
        }))
        .then(function (sections) {
            container.innerHTML = sections.join('\n');
            initScrollSpy();
            if (window.location.hash) {
                var target = document.querySelector(window.location.hash);
                if (target) target.scrollIntoView();
            }
        })
        .catch(function (err) {
            container.innerHTML = '<p class="text-red-500">Failed to load documentation. ' + err.message + '</p>';
        });

        function initScrollSpy() {
            var sections = pages.map(function (p) { return document.getElementById(p.id); }).filter(Boolean);
            var links = document.querySelectorAll('.nav-link');

            function update() {
                var scrollY = window.scrollY + 80;
                var current = '';
                sections.forEach(function (section) {
                    if (section.offsetTop <= scrollY) current = section.id;
                });
                links.forEach(function (link) {
                    link.classList.toggle('active', link.getAttribute('href') === '#' + current);
                });
            }

            window.addEventListener('scroll', update, { passive: true });
            update();
        }

        var btn = document.getElementById('mobile-nav-btn');
        var aside = document.querySelector('aside');
        btn.addEventListener('click', function () {
            aside.classList.toggle('hidden');
            aside.classList.toggle('fixed');
            aside.classList.toggle('inset-0');
            aside.classList.toggle('z-40');
            aside.classList.toggle('block');
        });
    </script>

</body>
</html>
